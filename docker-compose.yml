services:
  api:
    build: .
    container_name: etl_api
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage

  ui:
    build: .
    container_name: etl_ui
    command: streamlit run ui.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "8501:8501"
    volumes:
      - ./storage:/app/storage
    depends_on:
      - api